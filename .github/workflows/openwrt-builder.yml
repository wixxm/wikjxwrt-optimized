name: OpenWrt Builder (Optimized)

on:
  workflow_dispatch:
    inputs:
      incremental:
        description: '增量编译（复用缓存）'
        required: false
        default: 'false'
        type: boolean

env:
  REPO_URL: https://github.com/wixxm/OpenWrt-24.10
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: op1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        curl -sSL https://raw.githubusercontent.com/wixxm/wikjxwrt-auto/main/hj.sh -o hj.sh
        sudo chmod +x hj.sh
        sudo bash hj.sh
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Check root free space
      run: |
        echo "Checking root free space..."
        df -h /
        FREE_MB=$(df --output=avail -m / | tail -n 1 | tr -d ' ')
        echo "Root free space: ${FREE_MB} MB"
        if [ "$FREE_MB" -lt 20000 ]; then
          echo "❌ Root free space less than 20GB. Aborting build."
          exit 1
        else
          echo "✅ Root free space is sufficient."
        fi

    - name: Cache ccache
      id: cache-ccache
      uses: actions/cache@v4
      with:
        path: /workdir/ccache
        key: ccache-openwrt-24.10-${{ github.run_id }}
        restore-keys: |
          ccache-openwrt-24.10-

    - name: Load custom feeds (优化版脚本)
      run: |
        curl -sSL https://raw.githubusercontent.com/wixxm/wikjxwrt-optimized/main/wikjxwrt.sh -o wikjxwrt.sh
        chmod +x wikjxwrt.sh
        if [ "${{ github.event.inputs.incremental }}" == "true" ]; then
          echo "=== 启用增量编译模式 ==="
          ./wikjxwrt.sh --incremental --skip-compile
        else
          echo "=== 全新编译模式 ==="
          ./wikjxwrt.sh --skip-compile
        fi

    - name: Unset CI environment variables for Rust host
      run: |
        unset CI
        unset GITHUB_ACTIONS
        unset GITHUB_RUN_ID
        unset GITHUB_WORKFLOW
        unset GITHUB_REPOSITORY
        unset RUNNER_OS

    - name: Compile the firmware
      id: compile
      env:
        CCACHE_DIR: /workdir/ccache
      run: |
        cd openwrt
        export CCACHE_DIR="/workdir/ccache"
        export CCACHE_SIZE="5G"
        echo 'CONFIG_CCACHE=y' >> .config
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        find . ! -name '*.bin' ! -name '*.img.gz' ! -name '*wikjxwrt'  -type f -delete 
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        DATE_TAG=$(date +"%Y%m%d-%H%M")
        PREFIXES=("⚡" "🌈" "✨" "🚀" "🔥" "🌟" "🎉" "🌻" "💡")
        RAND_PREFIX="${PREFIXES[$RANDOM % ${#PREFIXES[@]}]}"
        TAG_NAME="${RAND_PREFIX}wikjxwrt-${DATE_TAG}"
        echo "release_tag=${TAG_NAME}" >> $GITHUB_OUTPUT
        echo "🚀 OpenWrt 24.10 编译完成！" > release.txt
        echo "📅 编译日期: $(date +"%Y-%m-%d %H:%M")" >> release.txt
        echo "📦 源码版本: openwrt-24.10" >> release.txt
        echo "" >> release.txt
        echo "💡 优化项: ccache缓存 + 并行克隆 + 增量编译支持" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 5
        keep_minimum_runs: 10
      env:
       GITHUB_TOKEN: ${{ secrets.GH_PAT }}

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 10
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GH_PAT }}
